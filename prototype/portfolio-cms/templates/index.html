<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio — Pilgrimage Media</title>
    <meta
      name="description"
      content="Selected projects — athletes and fitness, sports and events, health and adventure."
    />
    <link rel="canonical" href="https://pilgrimage.media/portfolio/" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/portfolio.css" />
    <link rel="preload" href="/fonts/gelasio-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/lexend-700.woff2" as="font" type="font/woff2" crossorigin />
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="wordmark" href="/"><img class="wordmark__logo" src="/images/brand/pilgrimage-logo.png" alt="Pilgrimage Media" /></a>
        <nav class="site-nav" aria-label="Primary">
          <ul>
            <li><a href="/#portfolio">Portfolio</a></li>
            <li><a href="/#services">Services</a></li>
            <li><a href="/about/">About</a></li>
            <li><a href="/contact/">Contact</a></li>
          </ul>
        </nav>
        <button
          type="button"
          class="nav-toggle"
          id="nav-toggle"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <svg viewBox="0 0 25 19" width="25" height="19" fill="none" aria-hidden="true">
            <rect y="0" width="25" height="1.5" fill="currentColor" />
            <rect y="8.75" width="25" height="1.5" fill="currentColor" />
            <rect y="17.5" width="25" height="1.5" fill="currentColor" />
          </svg>
        </button>
      </div>
      <div class="mobile-menu" id="mobile-menu" hidden>
        <button type="button" class="mobile-menu__close" id="nav-close" aria-label="Close menu">
          <svg viewBox="0 0 25 25" width="25" height="25" fill="none" aria-hidden="true">
            <rect x="1" y="0" width="32" height="1.5" fill="currentColor" transform="rotate(45 1 0)" />
            <rect x="0" y="23" width="32" height="1.5" fill="currentColor" transform="rotate(-45 0 23)" />
          </svg>
        </button>
        <ul>
          <li><a href="/#portfolio">Portfolio</a></li>
          <li><a href="/#services">Services</a></li>
          <li><a href="/about/">About</a></li>
          <li><a href="/contact/">Contact</a></li>
        </ul>
      </div>
    </header>

    <main class="portfolio-page" style="padding-top: var(--header-h)">
      <section class="project-hero">
        <h1>Portfolio</h1>
        <p class="project-body">{{count}} projects.</p>
      </section>

      <div class="project-grid">{{cards}}</div>
    </main>

    <footer class="site-footer">
      <div class="fe-pad fe-grid site-footer__grid">
        <p class="site-footer__link-1"><a href="/fitness-athletes/">Athletes &amp; Fitness</a></p>
        <p class="site-footer__link-2"><a href="/sports-events/">Sports &amp; Events</a></p>
        <p class="site-footer__link-3"><a href="/health-adventure/">Health &amp; Adventure</a></p>
        <p class="site-footer__link-4"><a href="/about/">About</a></p>
        <p class="site-footer__link-5"><a href="/contact/">Contact</a></p>

        <img class="site-footer__mark" src="/images/brand/pilgrimage-mountains.jpg" alt="Pilgrimage Media" width="642" height="493" loading="lazy" />

        <ul class="site-footer__social">
          <li>
            <a href="https://instagram.com/pilgrimagemedia" target="_blank" rel="noopener noreferrer" aria-label="Pilgrimage Media on Instagram">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
                <rect x="2.5" y="2.5" width="19" height="19" rx="5" stroke="currentColor" stroke-width="1.6" />
                <circle cx="12" cy="12" r="4.7" stroke="currentColor" stroke-width="1.6" />
                <circle cx="17.4" cy="6.6" r="1.15" fill="currentColor" />
              </svg>
              <span>Instagram</span>
            </a>
          </li>
          <li>
            <a href="https://www.pinterest.com/pilgrimagemedia/" target="_blank" rel="noopener noreferrer" aria-label="Pilgrimage Media on Pinterest">
              <img src="/images/brand/pinterest-icon.png" alt="" width="22" height="22" aria-hidden="true" />
              <span>Pinterest</span>
            </a>
          </li>
          <li>
            <a href="https://www.strava.com/athletes/mikethezier" target="_blank" rel="noopener noreferrer" aria-label="Pilgrimage Media on Strava">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
                <path d="M10.3 2.5 15.9 13.6h-3.4l-2.2-4.6-2.3 4.6H4.6z" fill="currentColor" />
                <path d="m12.9 13.6 2 4 2-4h2.6l-4.6 8-4.6-8z" fill="currentColor" />
              </svg>
              <span>Strava</span>
            </a>
          </li>
        </ul>
      </div>
    </footer>

    <script src="/js/main.js" defer></script>
  </body>
</html>

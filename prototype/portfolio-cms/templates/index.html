<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio — Pilgrimage Media</title>
    <meta name="description" content="Selected projects — athletes, sports events, health and adventure." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,600;1,600&family=Roboto+Condensed:ital,wght@0,600;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/portfolio/portfolio.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="/">Pilgrimage Media</a>
      <nav class="site-nav">
        <a href="/#portfolio">Portfolio</a>
        <a href="/#services">Services</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
    </header>

    <main class="wrap">
      <section class="project-hero">
        <h1>Portfolio</h1>
        <p class="project-body">{{count}} projects.</p>
      </section>

      <div class="project-grid">{{cards}}</div>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <h3>Pilgrimage Media</h3>
        <p>Media for those on a journey to make themselves and others better.</p>
      </div>
    </footer>
  </body>
</html>

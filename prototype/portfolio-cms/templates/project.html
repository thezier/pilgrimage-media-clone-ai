<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}} — Pilgrimage Media</title>
    <meta name="description" content="{{summary}}" />

    <!-- Real OG tags. The live Squarespace site has empty meta descriptions on
         every page; generating them here fixes that for free. -->
    <meta property="og:type" content="article" />
    <meta property="og:title" content="{{title}} — Pilgrimage Media" />
    <meta property="og:description" content="{{summary}}" />
    <meta property="og:image" content="{{ogImage}}" />
    <link rel="canonical" href="https://pilgrimage.media/portfolio/{{slug}}/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,600;1,600&family=Roboto+Condensed:ital,wght@0,600;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/portfolio/portfolio.css" />

    <script type="application/ld+json">
      {{jsonld}}
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="/">Pilgrimage Media</a>
      <nav class="site-nav">
        <a href="/#portfolio">Portfolio</a>
        <a href="/#services">Services</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
    </header>

    <main class="wrap">
      <section class="project-hero">
        <p class="eyebrow">{{category}}</p>
        <h1>{{title}}</h1>
        <p class="lead">{{summary}}</p>
        <div class="project-body">{{body}}</div>
        <p class="project-meta">{{shotOn}}</p>
      </section>

      <div class="gallery">{{gallery}}</div>

      <a class="back-link" href="/portfolio/">← All projects</a>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <h3>Pilgrimage Media</h3>
        <p>Media for those on a journey to make themselves and others better.</p>
      </div>
    </footer>
  </body>
</html>
